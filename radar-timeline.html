<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>流动性压力雷达 · 时间轴</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    background: #FFFFFF;
    color: #1A1A1A;
    min-height: 100vh;
    padding: 24px;
  }

  h1 {
    font-size: 18px;
    font-weight: 600;
    color: #1A1A1A;
    letter-spacing: 0.02em;
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 12px;
    color: #888;
    margin-bottom: 20px;
  }

  /* ── Loading overlay ── */
  #loading-overlay {
    position: fixed; inset: 0;
    background: rgba(255,255,255,0.92);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 999;
    gap: 16px;
  }
  #loading-overlay.hidden { display: none; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid #E0E0E0;
    border-top-color: #E8700A;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-text {
    font-size: 13px;
    color: #555;
  }

  /* ── Main layout ── */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  .card {
    background: #F5F5F5;
    border: 1px solid #E0E0E0;
    border-radius: 8px;
    padding: 16px;
  }

  /* ── Radar card ── */
  .radar-card {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 340px;
  }

  #radarCanvas {
    max-width: 320px;
    max-height: 320px;
  }

  /* ── Score card ── */
  .score-card {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .current-date {
    font-size: 12px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .composite-score-wrap {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  #compositeScore {
    font-size: 72px;
    font-weight: 700;
    line-height: 1;
    transition: color 0.2s;
  }

  .score-label {
    font-size: 13px;
    color: #888;
  }

  .rating-text {
    font-size: 14px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 4px;
    display: inline-block;
    width: fit-content;
  }

  /* ── Dimension bars ── */
  .dim-bars {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 4px;
  }

  .dim-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dim-name {
    font-size: 11px;
    color: #555;
    width: 90px;
    flex-shrink: 0;
  }

  .dim-name.stress { color: #C62828; font-weight: 600; }

  .bar-track {
    flex: 1;
    height: 6px;
    background: #E0E0E0;
    border-radius: 3px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.15s, background 0.15s;
  }

  .dim-val {
    font-size: 11px;
    color: #888;
    width: 16px;
    text-align: right;
  }

  /* ── Timeline slider ── */
  .timeline-card {
    background: #F5F5F5;
    border: 1px solid #E0E0E0;
    border-radius: 8px;
    padding: 16px 20px 12px;
  }

  .slider-container {
    position: relative;
    margin-bottom: 28px;
  }

  #timeSlider {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: #E0E0E0;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  #timeSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #E8700A;
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }

  #timeSlider::-moz-range-thumb {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #E8700A;
    cursor: pointer;
    border: none;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }

  /* Crisis markers */
  .markers-row {
    position: absolute;
    top: -20px;
    left: 0; right: 0;
    pointer-events: none;
  }

  .crisis-marker {
    position: absolute;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: auto;
    cursor: default;
  }

  .crisis-marker .marker-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #C62828;
    margin-bottom: 2px;
  }

  .crisis-marker .marker-label {
    font-size: 9px;
    color: #C62828;
    white-space: nowrap;
    background: #FFF;
    padding: 0 2px;
    letter-spacing: -0.01em;
  }

  /* Year ticks */
  .year-ticks {
    position: relative;
    height: 16px;
    margin-top: 4px;
  }

  .year-tick {
    position: absolute;
    transform: translateX(-50%);
    font-size: 10px;
    color: #999;
  }

  /* Legend */
  .radar-legend {
    display: flex;
    gap: 16px;
    margin-top: 8px;
    font-size: 11px;
    color: #666;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .legend-line {
    width: 20px;
    height: 2px;
  }

  .legend-line.current {
    background: #E8700A;
  }

  .legend-line.ref {
    background: #C62828;
    border-top: 2px dashed #C62828;
    height: 0;
  }
</style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <div id="loading-text">正在加载数据…</div>
</div>

<!-- Header -->
<h1>美联储流动性压力雷达</h1>
<p class="subtitle">Fed Liquidity Stress Monitor · 5年滚动历史分位 · 数据来源 FRED</p>

<!-- Main grid -->
<div class="main-grid">
  <!-- Radar -->
  <div class="card radar-card">
    <canvas id="radarCanvas"></canvas>
  </div>

  <!-- Score panel -->
  <div class="card score-card">
    <div class="current-date" id="currentDate">—</div>

    <div>
      <div class="composite-score-wrap">
        <div id="compositeScore">—</div>
        <div class="score-label">/ 5 综合压力</div>
      </div>
      <div id="ratingText" class="rating-text" style="margin-top:6px;">—</div>
    </div>

    <!-- Legend -->
    <div class="radar-legend">
      <div class="legend-item">
        <div class="legend-line current"></div>
        <span>当前</span>
      </div>
      <div class="legend-item">
        <div class="legend-line ref"></div>
        <span>COVID崩盘(2020-03)</span>
      </div>
    </div>

    <!-- Dimension bars -->
    <div class="dim-bars" id="dimBars">
      <!-- populated by JS -->
    </div>
  </div>
</div>

<!-- Timeline -->
<div class="timeline-card">
  <div class="slider-container">
    <div class="markers-row" id="markersRow"></div>
    <input type="range" id="timeSlider" min="0" max="0" value="0" step="1">
  </div>
  <div class="year-ticks" id="yearTicks"></div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────────
const OBS_START      = '2019-01-01'; // data fetch start (for rolling window base)
const DISPLAY_START  = '2020-01-01'; // slider display start
const ROLLING_WINDOW = 260;          // 5 years of weekly data

const CRISIS_EVENTS = [
  { date: '2020-03-09', label: 'COVID崩盘' },
  { date: '2022-06-01', label: 'QT开始' },
  { date: '2023-03-10', label: 'SVB危机' },
  { date: '2023-06-03', label: 'TGA重建' },
  { date: '2025-12-01', label: 'QT停止' },
];

const COVID_REF_DATE = '2020-03-09'; // reference snapshot for radar comparison

const WEIGHTS = {
  nl:       0.25,
  tga:      0.18,
  reserves: 0.22,
  effrIorb: 0.20,
  sofrEffr: 0.10,
  rrp:      0.05,
};

const DIM_LABELS = ['净流动性', 'TGA', '准备金', 'EFFR-IORB', 'SOFR-EFFR', 'ON RRP'];
const DIM_KEYS   = ['nl', 'tga', 'reserves', 'effrIorb', 'sofrEffr', 'rrp'];

// Score → color mapping
const SCORE_COLORS = {
  1: '#2E7D32',
  2: '#00838F',
  3: '#757575',
  4: '#E8700A',
  5: '#C62828',
};

const RATING_LABELS = {
  1: { text: '极度宽松', bg: '#E8F5E9', color: '#2E7D32' },
  2: { text: '宽松',     bg: '#E0F7FA', color: '#00838F' },
  3: { text: '中性',     bg: '#F5F5F5', color: '#757575' },
  4: { text: '偏紧',     bg: '#FFF3E0', color: '#E8700A' },
  5: { text: '极度紧张', bg: '#FFEBEE', color: '#C62828' },
};

// Bar color by score
function barColor(score) {
  return SCORE_COLORS[Math.round(score)] || '#757575';
}

// ─────────────────────────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────────────────────────

function loadingText(msg) {
  document.getElementById('loading-text').textContent = msg;
}

async function fredFetch(seriesId, frequency) {
  let url = `/fred?series_id=${seriesId}&observation_start=${OBS_START}`;
  if (frequency) url += `&frequency=${frequency}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`FRED ${seriesId} failed: ${r.status}`);
  const j = await r.json();
  // Return array of {date, value}
  return (j.observations || [])
    .filter(o => o.value !== '.' && o.value !== null && o.value !== undefined)
    .map(o => ({ date: o.date, value: parseFloat(o.value) }));
}

// Build a date→value map from daily series
function buildDailyMap(obs) {
  const m = {};
  obs.forEach(o => { m[o.date] = o.value; });
  return m;
}

// For a given weekly date, look back to find up to N recent daily values
function dailyMean(dailyMap, weekDate, n = 5) {
  const sorted = Object.keys(dailyMap).sort();
  // Find entries <= weekDate
  const candidates = sorted.filter(d => d <= weekDate);
  const recent = candidates.slice(-n);
  if (recent.length === 0) return NaN;
  const vals = recent.map(d => dailyMap[d]).filter(v => !isNaN(v));
  if (vals.length === 0) return NaN;
  return vals.reduce((a, b) => a + b, 0) / vals.length;
}

// Rolling percentile: for index i in values array, 
// compute pct of values[i] among the previous `window` values (inclusive)
function rollingPct(values, i, window) {
  const start = Math.max(0, i - window + 1);
  const slice = values.slice(start, i + 1);
  const v = values[i];
  let below = 0;
  for (const x of slice) { if (x <= v) below++; }
  return below / slice.length;
}

// Score from pct (high=good, i.e. high pct=low stress)
function scoreFromPct(pct) {
  if (pct >= 0.70) return 1;
  if (pct >= 0.50) return 2;
  if (pct >= 0.35) return 3;
  if (pct >= 0.20) return 4;
  return 5;
}

// Score from pct for TGA (low pct = loose = low stress)
function scoreFromPctTGA(pct) {
  if (pct <= 0.30) return 1;
  if (pct <= 0.50) return 2;
  if (pct <= 0.65) return 3;
  if (pct <= 0.80) return 4;
  return 5;
}

// EFFR-IORB absolute score (bp)
function scoreEffrIorb(bp) {
  if (bp <= -7) return 1;
  if (bp <= -5) return 2;
  if (bp <= -2) return 3;
  if (bp <=  3) return 4;
  return 5;
}

// SOFR-EFFR absolute score (bp)
function scoreSofrEffr(bp) {
  if (bp <=  0) return 1;
  if (bp <=  3) return 2;
  if (bp <=  8) return 3;
  if (bp <= 15) return 4;
  return 5;
}

function compositeScore(scores) {
  return (
    scores.nl       * WEIGHTS.nl +
    scores.tga      * WEIGHTS.tga +
    scores.reserves * WEIGHTS.reserves +
    scores.effrIorb * WEIGHTS.effrIorb +
    scores.sofrEffr * WEIGHTS.sofrEffr +
    scores.rrp      * WEIGHTS.rrp
  );
}

// ─────────────────────────────────────────────────────────────
// CHART
// ─────────────────────────────────────────────────────────────
let radarChart = null;

function initChart() {
  const ctx = document.getElementById('radarCanvas').getContext('2d');
  radarChart = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: DIM_LABELS,
      datasets: [
        {
          label: '当前',
          data: [3,3,3,3,3,3],
          borderColor: '#E8700A',
          backgroundColor: 'rgba(232,112,10,0.12)',
          borderWidth: 2,
          pointBackgroundColor: '#E8700A',
          pointRadius: 3,
        },
        {
          label: 'COVID崩盘',
          data: [3,3,3,3,3,3],
          borderColor: '#C62828',
          backgroundColor: 'rgba(198,40,40,0.05)',
          borderWidth: 1.5,
          borderDash: [5,3],
          pointBackgroundColor: '#C62828',
          pointRadius: 2,
        }
      ]
    },
    options: {
      animation: false,
      responsive: true,
      scales: {
        r: {
          min: 0, max: 5,
          ticks: {
            stepSize: 1,
            font: { size: 9 },
            color: '#999',
            backdropColor: 'transparent',
            callback: v => v === 0 ? '' : v,
          },
          pointLabels: {
            font: { size: 11 },
            color: ctx => {
              // Will be updated dynamically
              return '#555';
            }
          },
          grid: {
            color: ctx => {
              // Outermost ring (value=5) → light red
              if (ctx.index === 4) return 'rgba(198,40,40,0.25)';
              return '#E0E0E0';
            },
            lineWidth: ctx => ctx.index === 4 ? 1.5 : 1,
          },
          angleLines: { color: '#E0E0E0' },
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: { enabled: false },
      }
    }
  });
}

function updateChart(currentScores, refScores, dimScoreArr) {
  if (!radarChart) return;

  // Update point label colors based on current scores
  radarChart.options.scales.r.pointLabels.color = (ctx) => {
    const score = dimScoreArr[ctx.index];
    return score >= 4 ? '#C62828' : '#555';
  };

  radarChart.data.datasets[0].data = DIM_KEYS.map(k => currentScores[k]);
  radarChart.data.datasets[1].data = DIM_KEYS.map(k => refScores[k]);
  radarChart.update('none');
}

// ─────────────────────────────────────────────────────────────
// UI UPDATE
// ─────────────────────────────────────────────────────────────

function buildDimBars() {
  const el = document.getElementById('dimBars');
  el.innerHTML = '';
  DIM_KEYS.forEach((key, i) => {
    const row = document.createElement('div');
    row.className = 'dim-row';
    row.innerHTML = `
      <div class="dim-name" id="dimName-${key}">${DIM_LABELS[i]}</div>
      <div class="bar-track">
        <div class="bar-fill" id="barFill-${key}" style="width:60%; background:#757575;"></div>
      </div>
      <div class="dim-val" id="dimVal-${key}">3</div>
    `;
    el.appendChild(row);
  });
}

function updateUI(entry) {
  if (!entry) return;
  const scores = entry.scores;
  const composite = entry.composite;
  const roundedComposite = Math.round(composite * 10) / 10;
  const scoreInt = Math.min(5, Math.max(1, Math.round(composite)));

  // Date
  document.getElementById('currentDate').textContent = entry.date;

  // Composite score
  const scoreEl = document.getElementById('compositeScore');
  scoreEl.textContent = roundedComposite.toFixed(1);
  scoreEl.style.color = SCORE_COLORS[scoreInt] || '#757575';

  // Rating text
  const rating = RATING_LABELS[scoreInt];
  const ratingEl = document.getElementById('ratingText');
  ratingEl.textContent = rating.text;
  ratingEl.style.background = rating.bg;
  ratingEl.style.color = rating.color;

  // Dim bars
  DIM_KEYS.forEach(key => {
    const s = scores[key];
    const pct = ((s - 1) / 4) * 100;
    document.getElementById('barFill-' + key).style.width = pct + '%';
    document.getElementById('barFill-' + key).style.background = barColor(s);
    document.getElementById('dimVal-' + key).textContent = s;
    const nameEl = document.getElementById('dimName-' + key);
    nameEl.className = 'dim-name' + (s >= 4 ? ' stress' : '');
  });

  // Radar
  updateChart(
    scores,
    entry.refScores,
    DIM_KEYS.map(k => scores[k])
  );
}

// ─────────────────────────────────────────────────────────────
// TIMELINE SLIDER
// ─────────────────────────────────────────────────────────────

function buildTimeline(displayDates) {
  const slider = document.getElementById('timeSlider');
  slider.min = 0;
  slider.max = displayDates.length - 1;
  slider.value = displayDates.length - 1;

  const minDate = displayDates[0];
  const maxDate = displayDates[displayDates.length - 1];

  function dateToFrac(dateStr) {
    const mn = new Date(minDate).getTime();
    const mx = new Date(maxDate).getTime();
    const d  = new Date(dateStr).getTime();
    return (d - mn) / (mx - mn);
  }

  // Crisis markers
  const markersRow = document.getElementById('markersRow');
  markersRow.innerHTML = '';
  CRISIS_EVENTS.forEach(ev => {
    if (ev.date < minDate || ev.date > maxDate) return;
    const frac = dateToFrac(ev.date);
    const div = document.createElement('div');
    div.className = 'crisis-marker';
    div.style.left = (frac * 100) + '%';
    div.innerHTML = `<div class="marker-dot"></div><div class="marker-label">${ev.label}</div>`;
    markersRow.appendChild(div);
  });

  // Year ticks
  const yearTicks = document.getElementById('yearTicks');
  yearTicks.innerHTML = '';
  const startYear = new Date(minDate).getFullYear();
  const endYear   = new Date(maxDate).getFullYear();
  for (let y = startYear; y <= endYear; y++) {
    const yDateStr = `${y}-01-01`;
    if (yDateStr < minDate) continue;
    const frac = Math.max(0, Math.min(1, dateToFrac(yDateStr)));
    const tick = document.createElement('div');
    tick.className = 'year-tick';
    tick.style.left = (frac * 100) + '%';
    tick.textContent = y;
    yearTicks.appendChild(tick);
  }
}

// ─────────────────────────────────────────────────────────────
// MAIN DATA PIPELINE
// ─────────────────────────────────────────────────────────────

async function main() {
  try {
    loadingText('正在拉取 WALCL…');
    const walcl   = await fredFetch('WALCL',    'w');
    loadingText('正在拉取 WDTGAL…');
    const wdtgal  = await fredFetch('WDTGAL',   'w');
    loadingText('正在拉取 RRPONTSYD…');
    const rrp     = await fredFetch('RRPONTSYD','w');
    loadingText('正在拉取 WRESBAL…');
    const wresbal = await fredFetch('WRESBAL',  'w');
    loadingText('正在拉取 EFFR（日度）…');
    const effrDay = await fredFetch('EFFR');
    loadingText('正在拉取 IORB（日度）…');
    const iorbDay = await fredFetch('IORB');
    loadingText('正在拉取 SOFR（日度）…');
    const sofrDay = await fredFetch('SOFR');

    loadingText('正在计算评分…');

    // Build daily maps
    const effrMap = buildDailyMap(effrDay);
    const iorbMap = buildDailyMap(iorbDay);
    const sofrMap = buildDailyMap(sofrDay);

    // Align weekly series on common dates
    // Use WALCL as anchor dates
    const walclMap  = buildDailyMap(walcl);
    const tgaMap    = buildDailyMap(wdtgal);
    const rrpMap    = buildDailyMap(rrp);
    const resMap    = buildDailyMap(wresbal);

    // Get sorted common weekly dates from WALCL
    const allWeekDates = walcl.map(o => o.date).sort();

    // For each weekly date, compute raw values
    const rawData = allWeekDates.map(date => {
      const walcl_v  = walclMap[date] ?? NaN;
      const tga_v    = tgaMap[date]   ?? NaN;
      const rrp_v    = rrpMap[date]   ?? NaN;
      const res_v    = resMap[date]   ?? NaN;
      const nl_v     = walcl_v - tga_v - rrp_v;

      const effr5 = dailyMean(effrMap, date, 5);
      const iorb5 = dailyMean(iorbMap, date, 5);
      const sofr5 = dailyMean(sofrMap, date, 5);
      const effrIorb_v = (isNaN(effr5) || isNaN(iorb5)) ? NaN : (effr5 - iorb5) * 100;
      const sofrEffr_v = (isNaN(sofr5) || isNaN(effr5)) ? NaN : (sofr5 - effr5) * 100;

      return { date, nl: nl_v, tga: tga_v, reserves: res_v, rrp: rrp_v,
               effrIorb: effrIorb_v, sofrEffr: sofrEffr_v };
    });

    // Extract value arrays for rolling pct computation
    const nlArr  = rawData.map(d => d.nl);
    const tgaArr = rawData.map(d => d.tga);
    const resArr = rawData.map(d => d.reserves);
    const rrpArr = rawData.map(d => d.rrp);

    // Compute all entries with scores
    const allEntries = rawData.map((d, i) => {
      const nlPct  = isNaN(d.nl)       ? 0.5 : rollingPct(nlArr,  i, ROLLING_WINDOW);
      const tgaPct = isNaN(d.tga)      ? 0.5 : rollingPct(tgaArr, i, ROLLING_WINDOW);
      const resPct = isNaN(d.reserves) ? 0.5 : rollingPct(resArr, i, ROLLING_WINDOW);
      const rrpPct = isNaN(d.rrp)      ? 0.5 : rollingPct(rrpArr, i, ROLLING_WINDOW);

      const scores = {
        nl:       scoreFromPct(nlPct),
        tga:      scoreFromPctTGA(tgaPct),
        reserves: scoreFromPct(resPct),
        effrIorb: isNaN(d.effrIorb) ? 3 : scoreEffrIorb(d.effrIorb),
        sofrEffr: isNaN(d.sofrEffr) ? 3 : scoreSofrEffr(d.sofrEffr),
        rrp:      scoreFromPct(rrpPct),
      };

      return {
        date:      d.date,
        scores,
        composite: compositeScore(scores),
      };
    });

    // Find COVID reference entry
    let refEntry = allEntries.find(e => e.date === COVID_REF_DATE);
    if (!refEntry) {
      // Find nearest date
      let minDiff = Infinity;
      allEntries.forEach(e => {
        const diff = Math.abs(new Date(e.date) - new Date(COVID_REF_DATE));
        if (diff < minDiff) { minDiff = diff; refEntry = e; }
      });
    }
    const refScores = refEntry ? refEntry.scores : { nl:5, tga:1, reserves:5, effrIorb:5, sofrEffr:5, rrp:5 };

    // Attach refScores to all entries
    allEntries.forEach(e => { e.refScores = refScores; });

    // Filter display entries (from 2020-01-01)
    const displayEntries = allEntries.filter(e => e.date >= DISPLAY_START);

    if (displayEntries.length === 0) throw new Error('No display data after filtering');

    // Build timeline
    const displayDates = displayEntries.map(e => e.date);
    buildTimeline(displayDates);

    // Init chart
    initChart();

    // Build dim bars
    buildDimBars();

    // Slider interaction
    const slider = document.getElementById('timeSlider');
    slider.addEventListener('input', () => {
      const idx = parseInt(slider.value, 10);
      updateUI(displayEntries[idx]);
    });

    // Show latest
    updateUI(displayEntries[displayEntries.length - 1]);

    // Hide loading
    document.getElementById('loading-overlay').classList.add('hidden');

  } catch (err) {
    loadingText('加载失败：' + err.message);
    console.error(err);
  }
}

main();
</script>
</body>
</html>
